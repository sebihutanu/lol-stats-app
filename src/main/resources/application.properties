spring.application.name=lol-stats-app
spring.profiles.active=local

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/lol_stats_db
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080

# Logging
logging.level.com.sebihutanu.lolstatsapp=DEBUG

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# JWT
app.jwt.expiration-ms=86400000

# Riot API
riot.api.base-url=https://europe.api.riotgames.com
riot.api.match-count=5

